<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>capybooboo.com — Your Weekly Capybara</title>
  <meta name="description" content="A random capybara photo and a silly inspirational quote, refreshed every week. That's it. That's the site.">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M07224YH8C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-M07224YH8C');
  </script>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9094032428607043"
   crossorigin="anonymous"></script>

  <style>
    :root {
      --brown: #6b4a2f;
      --tan: #e8d5b7;
      --cream: #fdf8f0;
      --green: #5a7052;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.8rem;
      color: var(--green);
    }

    header p {
      font-size: 0.95rem;
      opacity: 0.75;
      margin-top: 4px;
    }

    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(107, 74, 47, 0.15);
      max-width: 560px;
      width: 100%;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      display: block;
      background: var(--tan);
    }

    .card .quote {
      padding: 28px 32px;
      text-align: center;
    }

    .card .quote p {
      font-size: 1.25rem;
      font-style: italic;
      line-height: 1.5;
    }

    .card .credit {
      padding: 0 32px 20px;
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.5;
    }

    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      opacity: 0.6;
      text-align: center;
    }

    footer a {
      color: var(--brown);
    }
  </style>
</head>
<body>

  <header>
    <p>A new capybara and a new bit of nonsense wisdom, every week.</p>
  </header>

  <main class="card">
    <img id="capybara-photo" src="" alt="This week's capybara">
    <div class="quote">
      <p id="capybara-quote">Loading wisdom...</p>
    </div>
    <div class="credit" id="capybara-credit"></div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> capybooboo.com &middot; <a href="privacy.html">Privacy</a></p>
  </footer>

  <script src="js/photos.js"></script>
  <script src="js/quotes.js"></script>
  <script>
    // Weeks since a fixed epoch (Jan 1, 2020) — used to pick this week's photo and quote.
    // Independent indices so the pairing varies over time instead of locking in step.
    function weeksSinceEpoch() {
      const epoch = Date.UTC(2020, 0, 1);
      const now = Date.now();
      return Math.floor((now - epoch) / (7 * 24 * 60 * 60 * 1000));
    }

    const week = weeksSinceEpoch();
    const photo = PHOTOS[week % PHOTOS.length];
    const quote = QUOTES[week % QUOTES.length];

    document.getElementById('capybara-photo').src = photo.src;
    document.getElementById('capybara-quote').textContent = '"' + quote + '"';
    document.getElementById('capybara-credit').textContent =
      photo.source === 'mine' ? '' : 'Photo: ' + photo.credit;
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
